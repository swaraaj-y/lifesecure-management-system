<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Pay Payment | LifeSecure</title>

  <style>
    :root {
      --primary: #0f172a;
      --secondary: #3b82f6;
      --white: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.15);
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.85) 0%, rgba(30, 58, 138, 0.85) 100%),
        url('images/cssbgtopsection.jpeg') center/cover no-repeat fixed;
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 500px;
      margin: 40px 20px;
      background: var(--card-bg);
      padding: 40px;
      border-radius: 24px;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #e2e8f0;
      font-size: 0.95rem;
    }

    input,
    select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: var(--transition);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    select option {
      background: var(--primary);
      color: white;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: #10b981;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    button:hover {
      background: #059669;
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(16, 185, 129, 0.4);
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #94a3b8;
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }

    .back:hover {
      color: white;
    }

    header {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--white);
      padding: 24px;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: absolute;
      top: 0;
      width: 100%;
    }

    .logout-btn {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
      transition: var(--transition);
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.8);
    }
  </style>
  <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap' rel='stylesheet'>
</head>

<body>

  <header>
    <div>💳 Secure Checkout</div>
    <a href="logout" class="logout-btn">Logout</a>
  </header>

  <div class="container" style="margin-top: 100px;">
    <h2>💳 Premium Payment</h2>

    <form action="pay" method="post">

      <div class="form-group">
        <label>Policy Number</label>
        <input type="text" id="policyNo" name="policyNo" required placeholder="Enter Policy Number">
      </div>

      <div class="form-group">
        <label>Policy Holder Name</label>
        <input type="text" id="holderName" name="holderName" required placeholder="Enter Name">
      </div>

      <div class="form-group">
        <label>Premium Amount (₹)</label>
        <input type="number" id="amount" name="amount" required placeholder="Enter Amount">
      </div>

      <div class="form-group">
        <label>Payment Method</label>
        <select name="method" required>
          <option value="">Select Method</option>
          <option>UPI</option>
          <option>Credit Card</option>
          <option>Debit Card</option>
          <option>Net Banking</option>
        </select>
      </div>

      <button type="submit">Complete Payment Securely</button>
    </form>

    <a href="viewPolicies" class="back">⬅ Back to Policies</a>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const urlParams = new URLSearchParams(window.location.search);

      const policyNo = urlParams.get('policyNo');
      const amount = urlParams.get('amount');
      const holderName = urlParams.get('holderName');

      if (policyNo) document.getElementById('policyNo').value = policyNo;
      if (amount) document.getElementById('amount').value = amount;
      if (holderName) document.getElementById('holderName').value = holderName;
    });
  </script>
</body>

</html>
