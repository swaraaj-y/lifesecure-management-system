<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard | LifeSecure</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0f172a;
      --secondary: #3b82f6;
      --bg-light: #f8fafc;
      --text-dark: #1e293b;
      --white: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.15);
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.85) 0%, rgba(30, 58, 138, 0.85) 100%),
        url('images/cssbgtopsection.jpeg') center/cover no-repeat fixed;
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--white);
      padding: 24px;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout-btn {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
      transition: var(--transition);
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.8);
    }

    .container {
      padding: 60px 20px;
      text-align: center;
      color: var(--white);
      max-width: 1200px;
      margin: 0 auto;
    }

    .container h3 {
      margin-bottom: 50px;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .card {
      text-decoration: none;
      color: var(--white);
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 40px 25px;
      border-radius: 24px;
      text-align: center;
      transition: var(--transition);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    .card-icon {
      font-size: 48px;
      margin-bottom: 20px;
      transition: var(--transition);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
    }

    .card:hover .card-icon {
      transform: scale(1.1);
    }

    .card span {
      display: block;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .logout {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .logout:hover {
      background: rgba(239, 68, 68, 0.4);
      border-color: rgba(239, 68, 68, 0.5);
      box-shadow: 0 20px 40px rgba(239, 68, 68, 0.2);
    }
  </style>
</head>

<body>

  <header>
    <div>👤 Customer Dashboard</div>
    <a href="logout" class="logout-btn">Logout</a>
  </header>

  <div class="container">
    <h3>Welcome to LifeSecure</h3>

    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get("msg") === "under_review") {
        document.write("<div style='background: #f39c12; color: #fff; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-weight: bold;'>");
        document.write("✅ Your policy application was submitted successfully and is currently under review by an Agent.");
        document.write("</div>");
      }
    </script>

    <div class="dashboard">

      <!-- View Policies -->
      <a href="viewPolicies" class="card">
        <div class="card-icon">📄</div>
        <span>View My Policies</span>
      </a>

      <!-- Apply New Policy -->
      <a href="new-policy-list.html?r=1" class="card">
        <div class="card-icon">➕</div>
        <span>Apply New Policy</span>
      </a>

      <!-- Pay Premium -->
      <a href="pay-payment.html" class="card">
        <div class="card-icon">💳</div>
        <span>Pay Premium</span>
      </a>

      <!-- Payment History -->
      <a href="paymentHistory" class="card">
        <div class="card-icon">🧾</div>
        <span>Payment History</span>
      </a>

      <!-- Profile (FIXED) -->
      <a href="viewProfile" class="card">
        <div class="card-icon">👤</div>
        <span>Profile</span>
      </a>

      <!-- Support -->
      <a href="support.html" class="card">
        <div class="card-icon">🛠️</div>
        <span>Support</span>
      </a>



    </div>
  </div>

</body>

</html>
