<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Register | LifeSecure</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0f172a;
      --secondary: #3b82f6;
      --bg-light: #f8fafc;
      --text-dark: #1e293b;
      --white: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.9);
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 58, 138, 0.8) 100%),
        url('images/cssbgtopsection.jpeg') center/cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      padding: 40px 20px;
    }

    .register-container {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px 30px;
      width: 400px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-align: center;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .register-container h2 {
      color: var(--primary);
      margin-bottom: 30px;
      font-weight: 700;
      font-size: 1.8rem;
    }

    .input-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-dark);
      margin-bottom: 8px;
      display: block;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: var(--transition);
      background: rgba(255, 255, 255, 0.8);
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .register-btn {
      width: 100%;
      padding: 14px;
      background: var(--secondary);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 20px;
    }

    .register-btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5);
    }

    .link {
      display: inline-block;
      margin-top: 20px;
      font-size: 0.95rem;
      color: var(--text-dark);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
      margin-left: 10px;
      margin-right: 10px;
    }

    .link:hover {
      color: var(--secondary);
    }
  </style>
</head>

<body>

  <div class="register-container">
    <h2>🧑‍💼 Agent Registration</h2>

    <form action="agentRegister" method="post">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter full name" required>
      </div>

      <div class="input-group">
        <label>Mobile Number</label>
        <input type="tel" name="mobile" placeholder="Enter mobile number" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create password" required>
      </div>

      <button class="register-btn">Register</button>
    </form>

    <a href="agent-login.html" class="link">Already registered? Login</a>
    <a href="index.html" class="link">← Back to Home</a>
  </div>

  <script>
    function registerAgent(e) {
      e.preventDefault();

      const name = document.getElementById("name").value;

      alert("Agent " + name + " registered successfully!");
      window.location.href = "agent-login.html";
    }
  </script>

</body>

</html>
